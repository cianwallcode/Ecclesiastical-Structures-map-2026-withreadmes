<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SiteVault | 2026 Analysis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --accent: #3498db; --dark: #2c3e50; --bg: #f4f7f6; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.5em; text-transform: uppercase; }
        .nav-btns button { margin-left: 10px; padding: 10px 20px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: white; }
        .btn-active { background: var(--dark) !important; color: white !important; }
        .page { flex-grow: 1; display: none; position: relative; }
        .active-page { display: flex; }
        #map { flex-grow: 1; height: 100%; }
        #sidebar { width: 350px; background: white; border-left: 1px solid #ddd; padding: 20px; overflow-y: auto; }
        #page-dossier { overflow-y: auto; padding: 40px; flex-direction: column; align-items: center; background: #f9f9f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .tag { font-size: 0.7em; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #eee; margin-right: 5px; }
        .fav-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #analysis-box { position: absolute; bottom: 30px; left: 30px; width: 280px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000; }
    </style>
</head>
<body>
<nav>
    <div class="logo">SiteVault 2026</div>
    <div class="nav-btns">
        <button id="btn-map" class="btn-active" onclick="showPage('map')">Map</button>
        <button id="btn-dossier" onclick="showPage('dossier')">Dossier (<span id="count">0</span>)</button>
    </div>
</nav>
<div id="page-map" class="page active-page">
    <div id="map"></div>
    <div id="analysis-box">
        <h4 style="margin:0; color:var(--accent); font-size: 0.8em;">ANALYSIS</h4>
        <p style="font-size:0.85em; line-height:1.4;">2026 Ecclesiastical Audit: Identifying <b>Modernist Hulls</b> for adaptive reuse.</p>
    </div>
    <div id="sidebar"><h3>Queue</h3><div id="queue-list"></div></div>
</div>
<div id="page-dossier" class="page"><div id="dossier-grid" class="grid"></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([53.4, -7.9], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    var favorites = [];
    var churchData = [
        {id:1, name:"St. Kevin's", coords:[53.334,-6.265], bucket:"Latin Mass", style:"Victorian", sign:"Traditionalist anchor."},
        {id:16, name:"St. Brigid's Drumcong", coords:[54.026,-7.962], bucket:"Modernist Disused", style:"Modernist", sign:"Radial structural study."},
        {id:36, name:"St. Aengus Burt", coords:[55.034,-7.434], bucket:"Modernist In-Use", style:"Circular", sign:"McCormick icon."},
        {id:56, name:"Medieval Mile", coords:[52.652,-7.252], bucket:"Reused", style:"Gothic", sign:"Materiality study."}
    ];
    churchData.forEach(function(s) {
        L.circleMarker(s.coords, {radius:9, fillColor:'#3498db', color:'#fff', weight:2, fillOpacity:1}).addTo(map)
        .bindPopup(`<b>${s.name}</b><br><button class="fav-btn" onclick="addFav(${s.id})">Pin to Vault</button>`);
    });
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById('page-'+p).style.display = 'flex';
        document.querySelectorAll('.nav-btns button').forEach(b => b.classList.remove('btn-active'));
        document.getElementById('btn-'+p).classList.add('btn-active');
        if(p === 'dossier') renderDossier();
    }
    function addFav(id) {
        var s = churchData.find(x => x.id === id);
        if(!favorites.includes(s)) { favorites.push(s); document.getElementById('count').innerText = favorites.length; renderQueue(); }
    }
    function renderQueue() {
        document.getElementById('queue-list').innerHTML = favorites.map(s => `<p><b>${s.name}</b></p>`).join('');
    }
    function renderDossier() {
        document.getElementById('dossier-grid').innerHTML = favorites.map(s => `
            <div class="card">
                <img src="https://maps.googleapis.com/maps/api/staticmap?center=${s.coords[0]},${s.coords[1]}&zoom=18&size=600x400&maptype=satellite">
                <div style="padding:20px;"><h3>${s.name}</h3><p>${s.sign}</p></div>
            </div>`).join('');
    }
</script>
</body>
</html>
