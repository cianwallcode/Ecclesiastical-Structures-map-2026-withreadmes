        nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-weight: 900; font-size: 1.5em; letter-spacing: -1px; color: var(--dark); text-transform: uppercase; }

        .page { flex-grow: 1; display: none; overflow: hidden; position: relative; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; width: 100%; max-width: 1300px; }

        .card-body { padding: 25px; }

        .fav-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
